#
# jastm configuration file
# Load via: python jastm.py --config-file config.ini
# (or place in the script directory for auto-detection)
#
# Empty values are ignored (treated as not set).

[collection]
# Sampling interval in seconds. Must be a positive number.
sample_rate = 1.0

# 4-digit machine identifier. Leave empty to derive from NIC MAC address.
# machine_id =

[analysis]
# CPU peak threshold (absolute %). Any sample above this value is a CPU peak.
cpu_peak_percentage = 300.0

# RAM peak threshold (% below average available memory, 0-100).
# Any sample below avg * (1 - ram_peak_percentage/100) is a memory peak.
ram_peak_percentage = 30.0
