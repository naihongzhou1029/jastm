# mmc.ini — preset configuration for a 3-monitor setup
#
# Monitors are assigned in the order Windows enumerates display adapters
# (same order as Settings → System → Display → "Identify").
#
# [display] section keys:
#   topology : Controls the "Multiple Displays" behaviour.
#              extend   — Extend desktop across all monitors (default).
#              clone    — Duplicate the desktop on every monitor
#                         ("Duplicate Desktop on 1 and 2 / 1 and 3 / …"
#                         in Windows Settings → System → Display).
#              internal — Show only on the built-in / primary display
#                         ("Show only on 1" / "PC screen only").
#              external — Show only on the first external display
#                         ("Show only on 2" / "Second screen only").
#              When topology is not "extend" the per-monitor resolution and
#              position settings are applied by Windows automatically after
#              the topology switch and the [monitorN] sections are ignored.
#
# [monitorN] section keys (used only when topology = extend):
#   resolution    : WIDTHxHEIGHT in pixels
#   refresh_rate  : target refresh rate in Hz; the script downgrades automatically
#                   when the exact rate is not supported by the connected display.
#   primary       : true for the monitor that hosts the taskbar and new windows.
#                   Exactly one section must be true.
#   move_windows_to : true to collect all open windows onto this monitor after apply.

[display]
topology = extend

[monitor1]
resolution   = 1920x1080
refresh_rate = 60
primary      = false
move_windows_to = true

[monitor2]
resolution   = 1920x1080
refresh_rate = 60
primary      = false

[monitor3]
resolution   = 3840x2160
refresh_rate = 60
primary      = true
